name: ml-fraud-detection

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraud
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports: ["8000:8000"]
    environment:
      MODELS_DIR: /app/models
    depends_on: [postgres]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 6

  stats:
    build:
      context: .
      dockerfile: streaming/Dockerfile
    command: uvicorn streaming.stats_api:app --host 0.0.0.0 --port 8001
    ports: ["8001:8001"]
    environment:
      PG_DSN: "host=postgres dbname=fraud user=fraud password=fraud port=5432"
    depends_on:
      postgres: { condition: service_healthy }

  producer:
    build:
      context: .
      dockerfile: streaming/Dockerfile
    command: python -m streaming.producer
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: transactions
      TX_PER_SEC: "1000"
    depends_on:
      kafka: { condition: service_healthy }

  consumer:
    build:
      context: .
      dockerfile: streaming/Dockerfile
    command: python -m streaming.consumer
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: transactions
      DLQ_TOPIC: transactions.dlq
      API_URL: http://api:8000/predict
      PG_DSN: "host=postgres dbname=fraud user=fraud password=fraud port=5432"
    depends_on:
      kafka: { condition: service_healthy }
      postgres: { condition: service_healthy }
      api: { condition: service_started }
    deploy:
      replicas: 2

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports: ["3000:80"]
    depends_on: [stats]

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    depends_on: [api]

  grafana:
    image: grafana/grafana-oss:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports: ["3001:3000"]
    depends_on: [prometheus]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlruns/mlflow.db --default-artifact-root /mlruns
    ports: ["5000:5000"]
    volumes: ["mlruns:/mlruns"]

volumes:
  pgdata:
  mlruns:
