<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraud Detection — Live</title>
    <style>
      body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #0b1020; color: #e7eaf3; }
      .container { padding: 24px; max-width: 1400px; margin: 0 auto; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .card { background: #131a33; border: 1px solid #1f2a4a; border-radius: 12px; padding: 16px; }
      h1 { margin: 0 0 16px; font-size: 22px; }
      h2 { margin: 0 0 12px; font-size: 14px; color: #9aa4c7; text-transform: uppercase; letter-spacing: 0.06em; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #1f2a4a; }
      th { color: #9aa4c7; font-weight: 500; }
      .metric { font-size: 28px; font-weight: 600; }
      .sub { font-size: 12px; color: #9aa4c7; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
